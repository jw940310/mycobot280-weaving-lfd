# URDF velocity 한계(2.0944 rad/s = 120°/s)에 가속도 한계를 보강.
# 가속도 실측값 없음 → 보수적 2.5 rad/s^2 (W7 실기 튜닝 예정)
default_velocity_scaling_factor: 0.1
default_acceleration_scaling_factor: 0.1

joint_limits:
  joint2_to_joint1:
    has_velocity_limits: true
    max_velocity: 2.0944
    has_acceleration_limits: true
    max_acceleration: 2.5
  joint3_to_joint2:
    has_velocity_limits: true
    max_velocity: 2.0944
    has_acceleration_limits: true
    max_acceleration: 2.5
  joint4_to_joint3:
    has_velocity_limits: true
    max_velocity: 2.0944
    has_acceleration_limits: true
    max_acceleration: 2.5
  joint5_to_joint4:
    has_velocity_limits: true
    max_velocity: 2.0944
    has_acceleration_limits: true
    max_acceleration: 2.5
  joint6_to_joint5:
    has_velocity_limits: true
    max_velocity: 2.0944
    has_acceleration_limits: true
    max_acceleration: 2.5
  joint6output_to_joint6:
    has_velocity_limits: true
    max_velocity: 2.0944
    has_acceleration_limits: true
    max_acceleration: 2.5
